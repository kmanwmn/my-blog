<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Berkshire 聊天 — 个人博客</title>
<link rel="icon" href="data:,">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#03050a;color:#e0e4ee;line-height:1.6;transition:background .4s,color .4s;display:flex;flex-direction:column}
body.light{background:#f5f7fa;color:#1a2a3a}
::selection{background:rgba(0,123,255,.3)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a3a5a;border-radius:3px}
body.light ::-webkit-scrollbar-thumb{background:#b0b8c8}

/* Nav */
nav{flex-shrink:0;position:sticky;top:0;z-index:100;background:rgba(3,5,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(74,158,255,.1);padding:12px 0}
body.light nav{background:rgba(245,247,250,.95);border-bottom-color:rgba(0,0,0,.06)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;padding:0 16px}
.nav-brand{font-size:.85rem;font-weight:700;color:#fff;text-decoration:none}
body.light .nav-brand{color:#1a2a3a}
.nav-right{display:flex;align-items:center;gap:10px}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(74,158,255,.25);background:rgba(74,158,255,.1);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:#4a9eff}
.theme-btn:hover{background:rgba(74,158,255,.2)}
.nav-home{color:#6a8ab5;text-decoration:none;font-size:.78rem}
.nav-home:hover{color:#4a9eff}

/* Chat container */
.chat-container{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:0 16px;overflow:hidden}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px 0 8px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:5px}

.msg{margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{background:rgba(74,158,255,.15);color:#e0e4ee;padding:10px 16px;border-radius:16px 16px 4px 16px;max-width:72%;font-size:.88rem;line-height:1.5;border:1px solid rgba(74,158,255,.1)}
body.light .msg-user .bubble{background:rgba(37,99,235,.08);color:#1a2a3a;border-color:rgba(37,99,235,.1)}

.msg-assistant{display:flex;justify-content:flex-start}
.msg-assistant .bubble{background:rgba(255,255,255,.02);padding:10px 16px;border-radius:16px 16px 16px 4px;max-width:85%;font-size:.88rem;line-height:1.6;border:1px solid rgba(255,255,255,.04)}
body.light .msg-assistant .bubble{background:#fff;border-color:rgba(0,0,0,.06);color:#1a2a3a}

.msg-label{font-size:.68rem;color:#5a7a9a;margin-bottom:4px;padding:0 4px}
body.light .msg-label{color:#8a9aa8}

/* Tool call indicator */
.tool-call{font-size:.75rem;color:#6a8ab5;padding:4px 0 4px 4px;display:flex;align-items:center;gap:6px}
.tool-call .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(74,158,255,.15);border-top-color:#4a9eff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.tool-call.done{color:#34d399}
.tool-call.done .spinner{border-color:#34d39933;border-top-color:#34d399}
@keyframes spin{to{transform:rotate(360deg)}}

/* Thinking indicator */
.thinking{display:flex;align-items:center;gap:6px;padding:12px 16px;color:#5a7a9a;font-size:.82rem}
.thinking .dots{display:flex;gap:4px}
.thinking .dot{width:6px;height:6px;border-radius:50%;background:#4a9eff;animation:bounce 1.4s infinite}
.thinking .dot:nth-child(2){animation-delay:.2s}
.thinking .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* Input area */
.input-area{flex-shrink:0;padding:12px 0 16px;border-top:1px solid rgba(255,255,255,.04)}
body.light .input-area{border-top-color:rgba(0,0,0,.06)}
.input-wrap{display:flex;gap:8px;align-items:flex-end;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:6px;transition:border .3s}
.input-wrap:focus-within{border-color:#4a9eff}
body.light .input-wrap{background:#fff;border-color:rgba(0,0,0,.12)}
body.light .input-wrap:focus-within{border-color:#2563eb}
.input-wrap textarea{flex:1;border:none;background:transparent;color:#e0e4ee;font-size:.88rem;font-family:inherit;outline:none;resize:none;padding:6px 4px;max-height:120px;line-height:1.4}
body.light .input-wrap textarea{color:#1a2a3a}
.input-wrap textarea::placeholder{color:#5a7a9a}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:#4a9eff;color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.send-btn:hover{background:#3a8aee}
.send-btn:disabled{background:#2a4a6a;cursor:not-allowed}
body.light .send-btn:disabled{background:#b0b8c8}

/* Markdown in bubbles */
.bubble p{margin:4px 0}
.bubble p:first-child{margin-top:0}
.bubble p:last-child{margin-bottom:0}
.bubble strong{color:#fff}
body.light .bubble strong{color:#1a2a3a}
.bubble table{border-collapse:collapse;font-size:.8rem;margin:8px 0;width:100%}
.bubble th,.bubble td{padding:5px 10px;border:1px solid rgba(255,255,255,.06);text-align:left}
body.light .bubble th,body.light .bubble td{border-color:rgba(0,0,0,.08)}
.bubble th{background:rgba(74,158,255,.08);color:#8ab4f8;font-weight:500}
body.light .bubble th{background:rgba(37,99,235,.06);color:#2563eb}
.bubble code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:4px;font-size:.8rem}
body.light .bubble code{background:rgba(0,0,0,.05)}
.bubble pre{background:rgba(0,0,0,.3);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0}
.bubble pre code{background:none;padding:0}
.bubble ul,.bubble ol{padding-left:20px;margin:4px 0}
.bubble li{margin:2px 0}
.bubble hr{border:none;border-top:1px solid rgba(255,255,255,.06);margin:12px 0}
body.light .bubble hr{border-top-color:rgba(0,0,0,.06)}
.bubble h1{font-size:1.1rem;margin:12px 0 6px;color:#fff}
.bubble h2{font-size:.95rem;margin:10px 0 5px;color:#e0e4ee}
.bubble h3{font-size:.88rem;margin:8px 0 4px}
body.light .bubble h1,body.light .bubble h2{color:#1a2a3a}

/* Welcome */
.welcome{text-align:center;padding:40px 20px 20px}
.welcome .icon{font-size:3rem;margin-bottom:8px}
.welcome h2{font-size:1.1rem;color:#fff;margin-bottom:6px}
body.light .welcome h2{color:#1a2a3a}
.welcome p{font-size:.82rem;color:#6a8ab5;max-width:500px;margin:0 auto}
.welcome .examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.welcome .examples button{padding:6px 14px;border-radius:20px;border:1px solid rgba(74,158,255,.2);background:rgba(74,158,255,.06);color:#6a8ab5;font-size:.78rem;cursor:pointer;transition:all .3s;font-family:inherit}
.welcome .examples button:hover{background:rgba(74,158,255,.12);color:#4a9eff;border-color:#4a9eff}

/* Error */
.msg-error{text-align:center;padding:8px}
.msg-error .bubble{display:inline-block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:8px 16px;border-radius:8px;font-size:.82rem}

/* Mobile */
@media(max-width:600px){
  .msg-user .bubble,.msg-assistant .bubble{max-width:90%;font-size:.84rem}
  .welcome{padding:20px 10px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/blog/" class="nav-brand">&#128172; AI Berkshire 聊天</a>
    <div class="nav-right">
      <a href="/blog/" class="nav-home">&#8592; 博客首页</a>
      <button class="theme-btn" onclick="toggleTheme()" title="切换主题">&#9788;</button>
    </div>
  </div>
</nav>

<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">&#129302;</div>
      <h2>AI Berkshire 投研助手</h2>
      <p>基于巴菲特、芒格、段永平、李录价值投资框架，分析股票、搜索报告、计算财务指标</p>
      <div class="examples">
        <button onclick="sendExample('分析一下NVDA')">分析 NVDA</button>
        <button onclick="sendExample('腾讯目前估值合理吗？帮我算算PE/PB')">腾讯估值</button>
        <button onclick="sendExample('Morningstar有哪些宽护城河的低估股票？')">宽护城河低估股</button>
        <button onclick="sendExample('帮我搜一下关于AI算力的报告')">AI算力报告</button>
        <button onclick="sendExample('380元股价、19.5元EPS的股票，三情景估值如何？')">三情景估值</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chatInput" rows="1" placeholder="问关于投资、股票、报告的问题..."
        onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#e0e4ee;padding:8px 20px;border-radius:8px;font-size:.78rem;z-index:999;transition:opacity .3s;opacity:0;pointer-events:none;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)"></div>

<script>
const API = '/api/ai/chat';
let isProcessing = false;
let msgHistory = [];

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  try { localStorage.setItem('chat-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
(function(){
  var saved = (function(){try{return localStorage.getItem('chat-theme')}catch(e){return null}})();
  if (saved === 'dark') document.body.classList.remove('light');
  else document.body.classList.add('light'); // 默认白天
})();

// 自动滚动：只在用户未上翻时滚动到底部
function scrollToBottom(el) {
  // 如果距底部不足 40px 则认为用户在底部，自动滚动
  if (el.scrollHeight - el.scrollTop - el.clientHeight < 40) {
    el.scrollTop = el.scrollHeight;
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

function addMessage(role, html) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="bubble">${html}</div>`;
  el.appendChild(div);
  scrollToBottom(el);
  return div;
}

function addToolIndicator(name, status) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `tool-call ${status === 'done' ? 'done' : ''}`;
  const labels = {
    'stock_scan': '扫描股票', 'stock_scan_with_price': '扫描股票（含价格）',
    'calc': '计算', 'verify_market_cap': '验算市值', 'verify_valuation': '计算估值',
    'cross_validate': '交叉验证', 'benford_check': 'Benford检测',
    'three_scenario': '三情景估值', 'get_fair_value_top': '获取公允价值',
    'search_reports': '搜索报告', 'get_report': '读取报告', 'list_reports': '列出报告'
  };
  const label = labels[name] || name;
  if (status === 'done') {
    div.innerHTML = `<span class="spinner" style="border-top-color:#34d399;border-color:#34d39933"></span> ${label} ✅`;
  } else {
    div.innerHTML = `<span class="spinner"></span> ${label}...`;
  }
  el.appendChild(div);
  scrollToBottom(el);
  return div;
}

function addThinking() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking-indicator';
  div.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> AI 思考中...';
  el.appendChild(div);
  scrollToBottom(el);
}

function removeThinking() {
  const t = document.getElementById('thinking-indicator');
  if (t) t.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  // Simple markdown rendering
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold & italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Tables
    .replace(/\n\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g, (m, header, body) => {
      const hcells = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
      const rows = body.trim().split('\n').filter(r => r.trim()).map(r => {
        return '<tr>' + r.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      }).join('');
      return `\n<table><thead><tr>${hcells}</tr></thead><tbody>${rows}</tbody></table>\n`;
    })
    // Horizontal rule
    .replace(/^---$/gm, '<hr>')
    // Lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\d+\.\s(.+)/g, '<li>$1</li>')
    // Wrap consecutive <li> in <ul>
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Line breaks to paragraphs
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isProcessing) return;

  input.value = '';
  input.style.height = 'auto';

  // Hide welcome
  document.getElementById('welcome').style.display = 'none';

  // Add user message
  addMessage('user', renderMarkdown(text));

  // Disable input
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;

  // Add to history
  msgHistory.push({role: 'user', content: text});

  // Streaming response
  let assistantMsg = null;
  let fullContent = '';
  const toolIndicators = {};

  addThinking();

  try {
    const response = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages: msgHistory, temperature: 0.7}),
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;

        try {
          const event = JSON.parse(line.slice(6));

          if (event.type === 'text') {
            removeThinking();
            fullContent += event.content;
            if (!assistantMsg) {
              assistantMsg = addMessage('assistant', renderMarkdown(fullContent));
            } else {
              const bubble = assistantMsg.querySelector('.bubble');
              bubble.innerHTML = renderMarkdown(fullContent);
            }
            scrollToBottom(document.getElementById('messages'));
          }

          if (event.type === 'tool_start') {
            removeThinking();
            const indicator = addToolIndicator(event.name, 'running');
            toolIndicators[event.name + '_' + Date.now()] = indicator;
          }

          if (event.type === 'tool_result') {
            // Find and mark the tool indicator as done
            const indicators = document.querySelectorAll('.tool-call');
            for (const ind of indicators) {
              if (!ind.classList.contains('done') && ind.textContent.includes(event.name)) {
                ind.classList.add('done');
                ind.innerHTML = ind.innerHTML.replace('</span>', '</span>').replace('...', ' ✅');
                break;
              }
            }
          }

          if (event.type === 'error') {
            removeThinking();
            addMessage('assistant', `<span style="color:#f87171">${event.content}</span>`);
          }
        } catch(e) {}
      }
    }

    // Add assistant response to history
    if (fullContent) {
      msgHistory.push({role: 'assistant', content: fullContent});
    }

    // Keep history manageable (last 20 messages)
    const userCount = msgHistory.filter(m => m.role === 'user').length;
    if (userCount > 20) {
      msgHistory = msgHistory.slice(-20);
    }

  } catch (e) {
    removeThinking();
    addMessage('assistant', `<span style="color:#f87171">请求失败: ${e.message}</span>`);
  }

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

function sendExample(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

// Auto-resize textarea
const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
chatInput.focus();
</script>
</body>
</html>
